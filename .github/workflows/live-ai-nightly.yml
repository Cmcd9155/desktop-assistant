name: Live AI Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  live-ai:
    runs-on: ubuntu-latest
    env:
      RUN_LIVE_AI_TESTS: "1"
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      OPENCLAW_BASE_URL: ${{ secrets.OPENCLAW_BASE_URL }}
      OPENCLAW_SESSION_KEY: ${{ secrets.OPENCLAW_SESSION_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run live AI tests
        run: |
          cd backend
          pytest app/tests/live -m live -q --maxfail=1

